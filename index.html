<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Meet Service | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        .profile-card {
            margin-bottom: 30px;
        }

        .img-holder {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #4ade80, #38bdf8); /* Greenish-Blue Glow */
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.4);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0f172a;
            display: block;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .city-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4ade80;
            display: inline-block;
            margin-bottom: 25px;
        }

        .info-stack {
            margin-bottom: 30px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .glass-box p {
            font-size: 14px;
            line-height: 1.5;
            color: #d1d5db;
        }

        .highlight {
            color: #fff;
            font-weight: 600;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: 0.3s all;
            border: none;
        }

        /* Green Button for Personal Message */
        .btn-green {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
            text-transform: uppercase;
        }

        .btn-green:hover {
            background: #16a34a;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.6);
        }

        .btn-tg {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-tg:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .live-now {
            margin-top: 15px;
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <div class="img-holder">
                <img src="pic1.jpg" alt="Real Meet Profile" class="profile-img">
            </div>
            <h1>Real Meet Service</h1>
            <div class="city-tag">Premium Verified</div>
        </div>

        <div class="info-stack">
            <div class="glass-box">
                <p>We provide <span class="highlight">100% real and genuine</span> services in your city. Your satisfaction is our main priority.</p>
            </div>
        </div>

        <a href="https://t.me/xkhushii" class="btn btn-green">
            SEND PERSONAL MESSAGE
        </a>

        <a href="https://t.me/realmeetserviice" class="btn btn-tg">
            JOIN OFFICIAL CHANNEL
        </a>

        <div class="live-now">
            <div class="dot"></div> Currently Active & Available
        </div>
    </div>

</body>
</html>
