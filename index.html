            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--primary-blue);

        .profile-wrapper {
            width: 110px; height: 110px;
            margin: 0 auto 15px;

        }

        .profile-pic {

        .feature-item::before { content: '✦'; color: var(--primary-blue); margin-right: 10px; font-weight: bold; }
