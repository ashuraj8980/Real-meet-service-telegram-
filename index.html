    <style>
        * {

            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Subtle animated background glow */
        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(56, 189, 248, 0.1);
            filter: blur(100px);
            top: 10%;
            left: 10%;
            z-index: 1;
        }

        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            z-index: 10;
        }

        /* Premium Platinum Ring Animation */
        .img-holder {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(white, #38bdf8, #0088cc);
            box-shadow: 0 0 30px rgba(0, 136, 204, 0.3);
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #020617;
        }

        .header-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Official Blue Tick SVG */
        .blue-tick {
            width: 24px;
            height: 24px;
            fill: #0088cc;
            filter: drop-shadow(0 0 5px rgba(0, 136, 204, 0.5));
        }

        .badge-platinum {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            display: inline-block;
            margin-bottom: 25px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 22px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .glass-card p {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
            font-weight: 300;
        }

        .highlight {
            color: #fff;
            font-weight: 600;
            border-bottom: 1.5px solid #0088cc;
        }

        /* Ultra Professional Action Button */
        .btn-join {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            background: #0088cc;
            color: #fff;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4);
            margin-bottom: 15px;
            animation: pulse-btn 2.5s infinite;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 136, 204, 0.6); }
            100% { transform: scale(1); }
        }

        .btn-join:hover {
            background: #0099e6;
            transform: translateY(-3px);
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 15px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .status-bar {
            margin-top: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #4ade80;
            font-weight: 500;
        }

        .indicator {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
